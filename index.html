<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0"
  />
  
  <meta name="description" content="Welcome to Mission Graphics Studio. We provide professional graphic design, branding, and digital solutions.">
  <meta name="keywords" content="Mission Graphics Studio, graphic design, branding, logo design, digital studio">
  <meta name="robots" content="index, follow">

  
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mgs3solutions.github.io/">
  <meta property="og:title" content="Mission Graphics Studio">
  <meta property="og:description" content="Professional graphic design and digital solutions.">

  <meta name="google-site-verification" content="BMtfiXa8JgAxAHyuhQIvNmnEIN72mVh4T8HiOYMIX5c" />

  <title>MIssion Graphics Studio</title>
  
  
  <link rel="icon" href="IMG-20260723-WA0001.jpg.jpg">
</head>

<body>

  <style>
     
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background-color: #120817; 
  color: #ffffff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background-color: #d31f2f; 
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
  flex-wrap: wrap;
  gap: 1rem;
}

.logo {
  font-size: 1.5rem;
  font-weight: bold;
  letter-spacing: 1px;
}

nav {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  flex-wrap: wrap;
}

nav a {
  color: #ffffff;
  text-decoration: none;
  font-weight: 500;
  transition: opacity 0.3s ease;
}

nav a:hover {
  opacity: 0.8;
}

.login-btn {
  background-color: #ffffff;
  color: #d32f2f;
  border: none;
  padding: 0.5rem 1.2rem;
  font-weight: bold;
  border-radius: 20px;
  cursor: pointer;
  transition: transform 0.2s ease, background-color 0.3s ease;
}

.login-btn:hover {
  background-color: #f0f0f0;
  transform: scale(1.05);
}

.hero-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 1.5rem;
}

/* Profile Card: Stacks vertically by default on mobile */
.profile-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 2rem 1.5rem;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  max-width: 800px;
  width: 100%;
  position: relative;
  gap: 1.5rem;
  text-align: center;
}

.image-circle {
  width: 150px;
  height: 150px;
  min-width: 150px; 
  border-radius: 50%;
  border: 4px solid #ff1744;
  box-shadow: 0 0 20px rgba(255, 23, 68, 0.6);
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #2a1535;
}

.image-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.image-placeholder {
  color: #b388ff;
  font-size: 0.85rem;
  text-align: center;
  padding: 0;
  width: 100%;
  height: 100%;
}

.image-placeholder img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Bio Box */
.bio-box {
  background: #1c0d25;
  border-radius: 15px;
  padding: 1.5rem;
  border-top: 3px solid #ff1744; /* Changed border to top for mobile layout */
  border-left: none;
  width: 100%;
}

.bio-box h1 {
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
  color: #ffffff;
}

.bio-box h3 {
  font-size: 0.95rem;
  color: #ff1744;
  margin-bottom: 1rem;
  font-weight: 400;
}

.bio-box p {
  line-height: 1.6;
  color: #d1c4e9;
  font-size: 0.9rem;
}

/* Media Query: Switches back to side-by-side layout on tablets and desktops (screens wider than 768px) */
@media (min-width: 768px) {
  .profile-card {
    flex-direction: row;
    padding: 2rem;
    text-align: left;
    gap: 0;
  }

  .image-circle {
    width: 180px;
    height: 175px;
    min-width: 175px;
    margin-right: -25px;
    z-index: 2;
  }

  .bio-box {
    border-top: none;
    border-left: 3px solid #ff1744;
    padding: 2rem 2rem 2rem 3.5rem;
    z-index: 1;
  }

  .bio-box h1 {
    font-size: 1.8rem;
  }

  .bio-box h3 {
    font-size: 1rem;
  }

  .bio-box p {
    font-size: 0.95rem;
  }
}

  </style>
  <header>
    <div class="logo"><img src="/IMG-20260723-WA0001.jpg" width="50" height="40"></div>
    <nav>
      <a href="#home">Home</a>
      <a href="#services">Services</a>
      
      <button class="login-btn">LOGIN</button>
    </nav>
  </header>

  
  <main class="hero-container">
    <div class="profile-card">
      
     
      <div class="image-circle">
        
        <div class="image-placeholder"><img src="joel.jpg"></div>
      </div>

      
      <div class="bio-box">
        <h1>Hello, I'm Joel</h1>
        <h3>Full-Stack Graphics and Website Designer</h3>
        <p>
          Welcome to my website! I am a passionate creator who loves crafting clean designs, 
          modern templates, and intuitive user experiences. Feel free to explore my 
          services or get in touch!
        </p>
      </div>

    </div>
  </main>

</body>
</html>
